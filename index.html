<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="src/output.css">
</head>
<body>

  <div class="card">
  
    <header>
      <div class="search-bar">
        <input type="text" placeholder="Search city" class="search-input" id="searchInput">
        <div id="suggestions" class="suggestions"></div>
      </div>
    </header>

    <main>

      <section class="location-info">
        <div class="location-container">
          <img src="images/pin.png" alt="">
          <p class="location-text" id="cityName">San Francisco</p>
        </div>
        <p class="date-text" id="dateText">Thursday, January 1</p>
      </section>

      <section class="temperature-info">
        <img class="weather-icon" id="weatherIcon" src="images/cloud.png" alt="">
        <span class="temperature" id="temperature">18°</span>
        <span class="weather-desc" id="weatherDesc">Partly Cloudy</span>
        <span class="feels-like" id="feelsLike">Feels like 16°</span>
      </section>

      <section class="additional-info">
        <div>
          <img src="images/drop.png" alt="">
          <span>Humidity</span>
          <p id="humidity">72%</p>
        </div>
        <div>
          <img src="images/wind.png" alt="">
          <span>Wind</span>
          <p id="wind">5 km/h</p>
        </div>
        <div>
          <img src="images/gauge.png" alt="">
          <span>Pressure</span>
          <p id="pressure">1013 mb</p>
        </div>
      </section>

      <section class="forecast-section">
        <h2>7-Day Forecast</h2>
        <div class="forecast-cards" id="forecastCards">
          <!-- Forecast cards will be appended here -->
        </div>
      </section>

    </main>
  </div>

  <script src="script.js"></script>

</body>
</html>
