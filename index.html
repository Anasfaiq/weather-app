<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="src/output.css">
</head>
<body>

  <div class="card">
  
    <header>
      <div class="search-bar">
        <input type="text" placeholder="Search city" class="search-input">
      </div>
    </header>

    <main>

      <section class="location-info">
        <div class="location-container">
          <img src="images/pin.png" alt="">
          <p class="location-text">San Francisco</p>
        </div>
        <p class="date-text">Thursday, January 1</p>
      </section>

      <section class="temperature-info">
        <img class="weather-icon" src="images/cloud.png" alt="">
        <span class="temperature">18°</span>
        <span class="weather-desc">Partly Cloudy</span>
        <span class="feels-like">Feels like 16°</span>
      </section>

      <section class="additional-info">
        <div>
          <img src="images/drop.png" alt="">
          <p>Humidity</p>
          <p>72%</p>
        </div>
        <div>
          <img src="images/wind.png" alt="">
          <p>Wind</p>
          <p>5 km/h</p>
        </div>
        <div>
          <img src="images/gauge.png" alt="">
          <p>Pressure</p>
          <p>1013 mb</p>
        </div>
      </section>

      <section class="forecast-section">
        <h2>7-Day Forecast</h2>
        <div class="forecast-cards">
          <div class="forecast-card">
            <p>Fri</p>
            <img src="images/sun.png" alt="">
            <p>20° / 12°</p>
          </div>
          <div class="forecast-card">
            <p>Sat</p>
            <img src="images/cloud.png" alt="">
            <p>18° / 11°</p>
          </div>
          <div class="forecast-card">
            <p>Sun</p>
            <img src="images/rain.png" alt="">
            <p>16° / 10°</p>
          </div>
          <div class="forecast-card">
            <p>Mon</p>
            <img src="images/sun.png" alt="">
            <p>21° / 13°</p>
          </div>
          <div class="forecast-card">
            <p>Tue</p>
            <img src="images/cloud.png" alt="">
            <p>19° / 12°</p>
          </div>
          <div class="forecast-card">
            <p>Wed</p>
            <img src="images/rain.png" alt="">
            <p>17° / 11°</p>
          </div>
          <div class="forecast-card">
            <p>Thu</p>
            <img src="images/sun.png" alt="">
            <p>22° / 14°</p>
          </div>
        </div>
      </section>

    </main>
  </div>

</body>
</html>
